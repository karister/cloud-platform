<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#0891a0" opacity="0.16"/>
      <circle cx="0" cy="0" r="0.5" fill="#0891a0" opacity="0.1"/>
      <circle cx="20" cy="0" r="0.5" fill="#0891a0" opacity="0.1"/>
      <circle cx="0" cy="20" r="0.5" fill="#0891a0" opacity="0.1"/>
      <circle cx="20" cy="20" r="0.5" fill="#0891a0" opacity="0.1"/>
    </pattern>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="40" y1="0" x2="40" y2="40" stroke="#0891a0" stroke-width="0.5" opacity="0.1"/>
      <line x1="0" y1="40" x2="40" y2="40" stroke="#0891a0" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <pattern id="major" x="0" y="0" width="160" height="160" patternUnits="userSpaceOnUse">
      <line x1="160" y1="0" x2="160" y2="160" stroke="#066976" stroke-width="0.6" opacity="0.14"/>
      <line x1="0" y1="160" x2="160" y2="160" stroke="#066976" stroke-width="0.6" opacity="0.14"/>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0f2"/>
      <stop offset="100%" stop-color="#eef3f5"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#eef3f5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="240" height="240" fill="url(#bg)"/>
  <rect width="240" height="240" fill="url(#major)"/>
  <rect width="240" height="240" fill="url(#grid)"/>
  <rect width="240" height="240" fill="url(#dots)"/>
  <rect width="240" height="240" fill="url(#glow)"/>
</svg>
