<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <pattern id="circuit" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <line x1="0" y1="30" x2="24" y2="30" stroke="#2563eb" stroke-width="0.8" opacity="0.14"/>
      <line x1="36" y1="30" x2="60" y2="30" stroke="#2563eb" stroke-width="0.8" opacity="0.14"/>
      <line x1="30" y1="0" x2="30" y2="24" stroke="#2563eb" stroke-width="0.8" opacity="0.14"/>
      <line x1="30" y1="36" x2="30" y2="60" stroke="#2563eb" stroke-width="0.8" opacity="0.14"/>
      <circle cx="30" cy="30" r="2.6" fill="none" stroke="#2563eb" stroke-width="0.8" opacity="0.18"/>
      <circle cx="30" cy="30" r="0.9" fill="#2563eb" opacity="0.22"/>
      <circle cx="0" cy="0" r="1.4" fill="none" stroke="#2563eb" stroke-width="0.6" opacity="0.12"/>
      <circle cx="60" cy="60" r="1.4" fill="none" stroke="#2563eb" stroke-width="0.6" opacity="0.12"/>
    </pattern>
    <pattern id="diagonal" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <line x1="0" y1="80" x2="80" y2="0" stroke="#2563eb" stroke-width="0.4" opacity="0.06"/>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8edf6"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#f1f5f9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warm" cx="10%" cy="95%" r="45%">
      <stop offset="0%" stop-color="#bfdbfe" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#f1f5f9" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="240" height="240" fill="url(#bg)"/>
  <rect width="240" height="240" fill="url(#diagonal)"/>
  <rect width="240" height="240" fill="url(#circuit)"/>
  <rect width="240" height="240" fill="url(#glow)"/>
  <rect width="240" height="240" fill="url(#warm)"/>
</svg>
