<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <pattern id="circuit" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <!-- horizontal trace -->
      <line x1="0" y1="30" x2="24" y2="30" stroke="#1a2a50" stroke-width="1" opacity="0.5"/>
      <line x1="36" y1="30" x2="60" y2="30" stroke="#1a2a50" stroke-width="1" opacity="0.5"/>
      <!-- vertical trace -->
      <line x1="30" y1="0" x2="30" y2="24" stroke="#1a2a50" stroke-width="1" opacity="0.5"/>
      <line x1="30" y1="36" x2="30" y2="60" stroke="#1a2a50" stroke-width="1" opacity="0.5"/>
      <!-- node -->
      <circle cx="30" cy="30" r="3" fill="none" stroke="#1e3a60" stroke-width="1" opacity="0.6"/>
      <circle cx="30" cy="30" r="1" fill="#2a4a80" opacity="0.4"/>
      <!-- corner nodes -->
      <circle cx="0" cy="0" r="1.5" fill="none" stroke="#1e3a60" stroke-width="0.8" opacity="0.4"/>
      <circle cx="60" cy="60" r="1.5" fill="none" stroke="#1e3a60" stroke-width="0.8" opacity="0.4"/>
    </pattern>
    <pattern id="diagonal" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <line x1="0" y1="80" x2="80" y2="0" stroke="#141e3a" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="240" height="240" fill="#060b14"/>
  <rect width="240" height="240" fill="url(#diagonal)"/>
  <rect width="240" height="240" fill="url(#circuit)"/>
  <!-- subtle glow orb -->
  <radialGradient id="glow" cx="70%" cy="20%" r="50%">
    <stop offset="0%" stop-color="#1a3050" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#060b14" stop-opacity="0"/>
  </radialGradient>
  <rect width="240" height="240" fill="url(#glow)"/>
</svg>
