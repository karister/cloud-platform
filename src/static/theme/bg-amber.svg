<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="vein" x="0" y="0" width="100" height="80" patternUnits="userSpaceOnUse">
      <!-- organic curved lines simulating leaf veins -->
      <path d="M0 40 Q25 20 50 35 T100 28" fill="none" stroke="#e0c8a8" stroke-width="0.8" opacity="0.4"/>
      <path d="M0 55 Q30 70 55 50 T100 60" fill="none" stroke="#dcc4a0" stroke-width="0.6" opacity="0.3"/>
      <path d="M10 0 Q35 15 50 8 T90 5" fill="none" stroke="#e0c8a8" stroke-width="0.6" opacity="0.25"/>
      <!-- subtle branching -->
      <path d="M50 35 Q60 20 75 25" fill="none" stroke="#dcc4a0" stroke-width="0.5" opacity="0.25"/>
      <path d="M25 40 Q30 55 40 58" fill="none" stroke="#dcc4a0" stroke-width="0.5" opacity="0.2"/>
    </pattern>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#d8c098" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="#faf6f0"/>
  <rect width="200" height="200" fill="url(#dots)"/>
  <rect width="200" height="200" fill="url(#vein)"/>
  <!-- soft warm vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#faf6f0" stop-opacity="0"/>
    <stop offset="100%" stop-color="#e8d4b8" stop-opacity="0.12"/>
  </radialGradient>
  <rect width="200" height="200" fill="url(#vignette)"/>
</svg>
