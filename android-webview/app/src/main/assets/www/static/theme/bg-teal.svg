<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1.2" fill="#1a5054" opacity="0.5"/>
      <circle cx="0" cy="0" r="0.6" fill="#1a5054" opacity="0.25"/>
      <circle cx="20" cy="0" r="0.6" fill="#1a5054" opacity="0.25"/>
      <circle cx="0" cy="20" r="0.6" fill="#1a5054" opacity="0.25"/>
      <circle cx="20" cy="20" r="0.6" fill="#1a5054" opacity="0.25"/>
    </pattern>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="40" y1="0" x2="40" y2="40" stroke="#124548" stroke-width="0.5" opacity="0.3"/>
      <line x1="0" y1="40" x2="40" y2="40" stroke="#124548" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="#0d2829"/>
  <rect width="200" height="200" fill="url(#dots)"/>
  <rect width="200" height="200" fill="url(#grid)"/>
  <!-- subtle diagonal scanline -->
  <line x1="0" y1="0" x2="200" y2="200" stroke="#1a5054" stroke-width="0.3" opacity="0.15"/>
  <line x1="60" y1="0" x2="200" y2="140" stroke="#1a5054" stroke-width="0.3" opacity="0.1"/>
  <line x1="120" y1="0" x2="200" y2="80" stroke="#1a5054" stroke-width="0.3" opacity="0.1"/>
</svg>
