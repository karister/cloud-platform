<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <!-- hex grid pattern -->
    <pattern id="hex" x="0" y="0" width="40" height="69.28" patternUnits="userSpaceOnUse">
      <!-- hex shape -->
      <polygon points="20,0 40,11.55 40,34.64 20,46.19 0,34.64 0,11.55"
               fill="none" stroke="#d6dce5" stroke-width="0.7" opacity="0.6"/>
      <!-- offset hex -->
      <polygon points="20,46.19 40,57.74 40,80.83 20,92.38 0,80.83 0,57.74"
               fill="none" stroke="#d6dce5" stroke-width="0.7" opacity="0.6"/>
    </pattern>
    <pattern id="thin-grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <line x1="20" y1="0" x2="20" y2="20" stroke="#e0e4eb" stroke-width="0.4" opacity="0.4"/>
      <line x1="0" y1="20" x2="20" y2="20" stroke="#e0e4eb" stroke-width="0.4" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="160" height="160" fill="#f4f6f9"/>
  <rect width="160" height="160" fill="url(#thin-grid)"/>
  <rect width="160" height="160" fill="url(#hex)"/>
  <!-- blueprint corner accent -->
  <line x1="0" y1="0" x2="80" y2="0" stroke="#bcc4d0" stroke-width="1.5" opacity="0.2"/>
  <line x1="0" y1="0" x2="0" y2="80" stroke="#bcc4d0" stroke-width="1.5" opacity="0.2"/>
</svg>
